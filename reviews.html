<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Reviews - Golden Frames</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/reviews.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <div id="nav-placeholder"></div>

    <main class="main-content">
        
        <div class="reviews-header">
            <h1>Golden <span class="text-gold">Stories</span></h1>
            <p>Read what our clients say about their unforgettable events.</p>
        </div>

        <div class="reviews-layout">
            
            <div class="review-cta-card">
                <div class="google-icon">
                    <i class="fab fa-google"></i>
                </div>
                <h3>Share Your Experience</h3>
                <p>Your feedback means the world to us. Help us create more golden memories by leaving a review on Google.</p>
                
                <div class="stars-display">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                </div>

                <a href="#" target="_blank" class="btn-gold w-100">
                    Write a Review <i class="fas fa-external-link-alt" style="margin-left: 8px; font-size: 0.8rem;"></i>
                </a>
            </div>

            <div class="elfsight-container">
                <!-- Elfsight Google Reviews | Untitled Google Reviews -->
<script src="https://elfsightcdn.com/platform.js" async></script>
<div class="elfsight-app-dd1624af-0b52-48d0-b414-ecba0738e595" data-elfsight-app-lazy></div>
                </div>

        </div>

    </main>

    <script src="assets/js/global.js"></script>
    <script src="assets/js/router.js"></script>
</body>
</html>
